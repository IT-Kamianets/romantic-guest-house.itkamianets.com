<header
	class="header"
	[class.header--transparent]="isHome && !isScrolled"
	[class.header--solid]="!isHome || isScrolled"
>
	<div class="header__utility">
		<a class="header__utility-brand" routerLink="/">
			<svg
				width="28"
				height="28"
				viewBox="0 0 118 94"
				fill="currentColor"
				xmlns="http://www.w3.org/2000/svg"
				aria-hidden="true"
			>
				<path
					fill-rule="evenodd"
					clip-rule="evenodd"
					d="M24.509 0c-6.733 0-11.715 5.893-11.492 12.284.214 6.14-.064 14.092-2.066 20.577C8.943 39.365 5.547 43.485 0 44.014v5.972c5.547.529 8.943 4.649 10.951 11.153 2.002 6.485 2.28 14.437 2.066 20.577C12.794 88.106 17.776 94 24.51 94H93.5c6.733 0 11.714-5.893 11.491-12.284-.214-6.14.064-14.092 2.066-20.577 2.009-6.504 5.396-10.624 10.943-11.153v-5.972c-5.547-.529-8.934-4.649-10.943-11.153-2.002-6.484-2.28-14.437-2.066-20.577C105.214 5.894 100.233 0 93.5 0H24.508zM80 57.863C80 66.663 73.436 72 62.543 72H44a2 2 0 01-2-2V24a2 2 0 012-2h18.437c9.083 0 15.044 4.92 15.044 12.474 0 5.302-4.01 10.049-9.119 10.88v.277C75.317 46.394 80 51.21 80 57.863zM60.521 28.34H49.948v14.934h8.905c6.884 0 10.68-2.772 10.68-7.727 0-4.643-3.264-7.207-9.012-7.207zM49.948 49.2v16.458H60.91c7.167 0 10.964-2.876 10.964-8.281 0-5.406-3.903-8.178-11.425-8.178H49.948z"
				/>
			</svg>
			<span class="header__utility-title">Romantic</span>
			<span class="header__utility-subtitle">Guest House</span>
		</a>

		<div class="header__utility-actions">
			<div class="lang-toggle" role="radiogroup" aria-label="Language">
				<button
					type="button"
					class="lang-toggle__option"
					[class.active]="i18n.lang$() === 'ua'"
					role="radio"
					[attr.aria-checked]="i18n.lang$() === 'ua'"
					(click)="setLang('ua')"
				>
					{{ 'lang.ua' | t }}
				</button>
				<button
					type="button"
					class="lang-toggle__option"
					[class.active]="i18n.lang$() === 'en'"
					role="radio"
					[attr.aria-checked]="i18n.lang$() === 'en'"
					(click)="setLang('en')"
				>
					{{ 'lang.en' | t }}
				</button>
			</div>

			<div class="header__links">
				<button type="button" class="header__links-toggle" (click)="openLinks()">
					<i class="bi bi-link-45deg"></i>
					<span>{{ 'nav.links' | t }}</span>
				</button>
			</div>
		</div>
	</div>

	<div class="header__container">
		<a class="header__logo" routerLink="/">
			<svg width="30" height="30" viewBox="0 0 118 94" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
				<path fill-rule="evenodd" clip-rule="evenodd" d="M24.509 0c-6.733 0-11.715 5.893-11.492 12.284.214 6.14-.064 14.092-2.066 20.577C8.943 39.365 5.547 43.485 0 44.014v5.972c5.547.529 8.943 4.649 10.951 11.153 2.002 6.485 2.28 14.437 2.066 20.577C12.794 88.106 17.776 94 24.51 94H93.5c6.733 0 11.714-5.893 11.491-12.284-.214-6.14.064-14.092 2.066-20.577 2.009-6.504 5.396-10.624 10.943-11.153v-5.972c-5.547-.529-8.934-4.649-10.943-11.153-2.002-6.484-2.28-14.437-2.066-20.577C105.214 5.894 100.233 0 93.5 0H24.508zM80 57.863C80 66.663 73.436 72 62.543 72H44a2 2 0 01-2-2V24a2 2 0 012-2h18.437c9.083 0 15.044 4.92 15.044 12.474 0 5.302-4.01 10.049-9.119 10.88v.277C75.317 46.394 80 51.21 80 57.863zM60.521 28.34H49.948v14.934h8.905c6.884 0 10.68-2.772 10.68-7.727 0-4.643-3.264-7.207-9.012-7.207zM49.948 49.2v16.458H60.91c7.167 0 10.964-2.876 10.964-8.281 0-5.406-3.903-8.178-11.425-8.178H49.948z"/>
			</svg>
			<span class="header__logo-text">Romantic Guest House</span>
			<span class="header__logo-subtitle">{{ 'hero.kicker' | t }}</span>
		</a>

		<div class="header__overlay" [class.is-open]="isMenuOpen" (click)="closeMenu()"></div>
		<nav class="header__nav" [class.header__nav--open]="isMenuOpen">
			<a
				class="header__nav-link"
				routerLink="/"
				routerLinkActive="header__nav-link--active"
				[routerLinkActiveOptions]="{ exact: true }"
				(click)="closeMenu()"
			>
				{{ 'nav.home' | t }}
			</a>
			<a
				class="header__nav-link"
				routerLink="/rooms"
				routerLinkActive="header__nav-link--active"
				(click)="closeMenu()"
			>
				{{ 'nav.roomsLong' | t }}
			</a>
			<a
				class="header__nav-link"
				routerLink="/amenities"
				routerLinkActive="header__nav-link--active"
				(click)="closeMenu()"
			>
				{{ 'nav.amenities' | t }}
			</a>
			<a
				class="header__nav-link"
				routerLink="/location"
				routerLinkActive="header__nav-link--active"
				(click)="closeMenu()"
			>
				{{ 'nav.location' | t }}
			</a>
			<a
				class="header__nav-link"
				routerLink="/gallery"
				routerLinkActive="header__nav-link--active"
				(click)="closeMenu()"
			>
				{{ 'nav.gallery' | t }}
			</a>
		</nav>

		<div class="header__actions">
			<div class="lang-toggle lang-toggle--desktop" role="radiogroup" aria-label="Language">
				<button
					type="button"
					class="lang-toggle__option"
					[class.active]="i18n.lang$() === 'ua'"
					role="radio"
					[attr.aria-checked]="i18n.lang$() === 'ua'"
					(click)="setLang('ua')"
				>
					{{ 'lang.ua' | t }}
				</button>
				<button
					type="button"
					class="lang-toggle__option"
					[class.active]="i18n.lang$() === 'en'"
					role="radio"
					[attr.aria-checked]="i18n.lang$() === 'en'"
					(click)="setLang('en')"
				>
					{{ 'lang.en' | t }}
				</button>
			</div>
			<div class="header__links header__links--desktop">
				<button type="button" class="header__links-toggle" (click)="openLinks()">
					<i class="bi bi-link-45deg"></i>
					<span>{{ 'nav.links' | t }}</span>
				</button>
			</div>
		</div>

		<button
			class="header__hamburger"
			type="button"
			(click)="toggleMenu()"
			[attr.aria-expanded]="isMenuOpen"
			aria-label="Open menu"
		>
			<span class="header__hamburger-line"></span>
			<span class="header__hamburger-line"></span>
			<span class="header__hamburger-line"></span>
		</button>
	</div>
</header>
