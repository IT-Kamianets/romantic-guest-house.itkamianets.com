<main class="gallery-page">
	<section class="gallery-hero">
		<div class="container-lg px-4 py-5">
			<p class="section-kicker">{{ 'gallery.kicker' | t }}</p>
			<h1 class="section-title">{{ 'gallery.title' | t }}</h1>
			<p class="section-subtitle">{{ 'gallery.subtitle' | t }}</p>
		</div>
	</section>

	<section class="gallery-body">
		<div class="container-lg px-4 pb-5">
			<div class="gallery-toolbar">
				<div class="gallery-tabs">
					<button
						class="gallery-chip"
						type="button"
						*ngFor="let category of categories"
						[class.active]="selectedCategory === category.id"
						(click)="selectedCategory = category.id; onFiltersChanged()"
						[attr.aria-pressed]="selectedCategory === category.id"
					>
						{{ category.labelKey | t }}
					</button>
				</div>
				<div class="gallery-toolbar__search">
					<input
						type="text"
						class="form-control"
						[placeholder]="'gallery.searchPlaceholder' | t"
						[(ngModel)]="searchTerm"
						(ngModelChange)="onFiltersChanged()"
					/>
				</div>
				<div class="gallery-toolbar__count">
					<span class="badge-soft">{{ 'gallery.photos' | t: { count: filteredItems.length } }}</span>
				</div>
			</div>

			<div class="gallery-masonry" *ngIf="hasResults; else noResults">
				<button
					class="gallery-item"
					type="button"
					*ngFor="let item of pagedItems"
					(click)="openModal(item)"
					[aria-label]="item.title | t"
				>
					<img [src]="item.imageUrl" [alt]="item.title | t" loading="lazy" />
					<div class="gallery-item__overlay">
						<h3>{{ item.title | t }}</h3>
						<p>{{ item.subtitle | t }}</p>
					</div>
				</button>
			</div>

			<ng-template #noResults>
				<div class="gallery-empty">
					<p>{{ 'gallery.noResults' | t }}</p>
				</div>
			</ng-template>

			<nav class="mt-4" aria-label="Gallery pagination" *ngIf="hasResults">
				<ul class="pagination justify-content-center mb-0">
					<li class="page-item" [class.disabled]="currentPage === 1">
						<button class="page-link" type="button" (click)="prevPage()">
							{{ 'gallery.previous' | t }}
						</button>
					</li>
					<li
						class="page-item"
						[class.active]="page === currentPage"
						*ngFor="let page of pageNumbers"
					>
						<button class="page-link" type="button" (click)="goToPage(page)">
							{{ page }}
						</button>
					</li>
					<li class="page-item" [class.disabled]="currentPage === totalPages">
						<button class="page-link" type="button" (click)="nextPage()">
							{{ 'gallery.next' | t }}
						</button>
					</li>
				</ul>
			</nav>
		</div>
	</section>

	<section class="gallery-cta">
		<div class="container-lg px-4 pb-5">
			<app-cta-banner
				[kicker]="'gallery.ctaKicker' | t"
				[title]="'gallery.ctaTitle' | t"
				[body]="'gallery.ctaBody' | t"
			>
				<button class="btn btn-primary" type="button" (click)="openContact()">
					{{ 'gallery.ctaContact' | t }}
				</button>
				<a href="tel:+380675101504" class="btn btn-outline-primary">{{ 'gallery.ctaCall' | t }}</a>
			</app-cta-banner>
		</div>
	</section>

	<div class="gallery-modal" *ngIf="activeItem" (click)="closeModal()">
		<div class="gallery-modal__content" role="dialog" aria-modal="true" (click)="$event.stopPropagation()">
			<button class="gallery-modal__close" type="button" (click)="closeModal()" aria-label="Close">
				<i class="bi bi-x-lg"></i>
			</button>
			<div class="gallery-modal-media">
				<img class="gallery-modal-img" [src]="activeItem.imageUrl" [alt]="activeItem.title | t" />
			</div>
			<div class="gallery-modal__body">
				<h3>{{ activeItem.title | t }}</h3>
				<p>{{ activeItem.subtitle | t }}</p>
			</div>
		</div>
	</div>
</main>
