<main class="rooms-page">
	<section class="rooms-hero">
		<div class="container-lg px-4 py-5">
			<div class="rooms-hero__grid">
				<div class="rooms-hero__intro">
					<p class="section-kicker">{{ 'rooms.heroKicker' | t }}</p>
					<h1 class="section-title">{{ 'rooms.heroTitle' | t }}</h1>
					<p class="section-subtitle">{{ 'rooms.heroSubtitle' | t }}</p>
				</div>
				<div class="rooms-hero__aside">
					<div class="rooms-hero__card">
						<div class="badge-soft">{{ 'rooms.seasonal' | t }}</div>
						<p>{{ 'rooms.seasonalBody' | t }}</p>
					</div>
					<div class="rooms-hero__card rooms-hero__card--soft">
						<h3>{{ 'rooms.tipsTitle' | t }}</h3>
						<p>{{ 'rooms.tipsBody' | t }}</p>
					</div>
				</div>
			</div>
		</div>
	</section>

	<section class="rooms-toolbar">
		<div class="container-lg px-4">
			<div class="rooms-toolbar__bar">
				<div class="rooms-toolbar__chips">
					<span class="rooms-toolbar__label">{{ 'rooms.filterLabel' | t }}</span>
					<button
						*ngFor="let category of categories"
						class="chip"
						[class.active]="filters.category === category.id"
						(click)="filters.category = category.id; applyFilters()"
						type="button"
					>
						{{ category.labelKey | t }}
					</button>
				</div>
				<button
					class="rooms-toolbar__toggle"
					type="button"
					(click)="toggleFilters()"
					[attr.aria-expanded]="filtersOpen"
					aria-controls="rooms-filter-panel"
				>
					{{ 'rooms.filtersToggle' | t }}
					<i class="bi bi-sliders"></i>
				</button>
				<div id="rooms-filter-panel" class="rooms-toolbar__panel" [class.is-open]="filtersOpen">
					<div class="rooms-toolbar__search">
						<label class="form-label">{{ 'rooms.searchLabel' | t }}</label>
						<input
							type="text"
							class="form-control"
							[placeholder]="'rooms.searchPlaceholder' | t"
							[(ngModel)]="filters.searchQuery"
							(ngModelChange)="applyFilters()"
						/>
					</div>
					<div class="rooms-toolbar__sort">
						<label class="form-label">{{ 'rooms.sortLabel' | t }}</label>
						<select class="form-select" [(ngModel)]="filters.sortBy" (change)="applyFilters()">
							<option value="price-asc">{{ 'rooms.sortPriceAsc' | t }}</option>
							<option value="price-desc">{{ 'rooms.sortPriceDesc' | t }}</option>
							<option value="name">{{ 'rooms.sortName' | t }}</option>
						</select>
					</div>
				</div>
			</div>
		</div>
	</section>

	<section class="rooms-catalog">
		<div class="container-lg px-4 pb-5">
			<div class="rooms-catalog__grid">
				<app-list-item
					*ngFor="let product of filteredProducts"
					[product]="product"
					variant="horizontal"
					[showDetails]="false"
				></app-list-item>
			</div>

			<div class="rooms-empty" *ngIf="filteredProducts.length === 0">
				<p class="mb-2">{{ 'rooms.emptyTitle' | t }}</p>
				<button
					class="btn btn-outline-primary"
					(click)="filters = { category: 'rooms.categoryAll', searchQuery: '', sortBy: 'price-asc' }; applyFilters()"
				>
					{{ 'rooms.resetFilters' | t }}
				</button>
			</div>
		</div>
	</section>
</main>
