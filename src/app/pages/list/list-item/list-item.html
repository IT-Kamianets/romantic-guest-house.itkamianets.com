<article
	class="room-card"
	[ngClass]="{ 'room-card--horizontal': variant === 'horizontal' }"
>
	<div class="room-card__media">
		<img [src]="product.image" [alt]="product.title" loading="lazy" />
		<span class="room-card__tag">{{ product.category }}</span>
	</div>

	<div class="room-card__content">
		<div class="room-card__header">
			<h3 class="room-card__title">{{ product.title }}</h3>
			<p class="room-card__description">{{ product.description }}</p>
		</div>

		<div class="room-card__chips">
			<span class="chip" *ngFor="let item of highlights">{{ item }}</span>
		</div>

		<div class="room-card__footer">
			<div>
				<span class="room-card__price">From UAH {{ product.price }} / night (seasonal)</span>
				<span class="room-card__note">Exact price depends on dates—confirm during booking request.</span>
			</div>
			<div class="room-card__actions">
				<a *ngIf="showDetails" routerLink="/rooms" class="btn btn-outline-secondary">
					See details
				</a>
				<button class="btn btn-primary" type="button" (click)="bookNow($event)">
					Request booking
				</button>
			</div>
		</div>
	</div>
</article>
