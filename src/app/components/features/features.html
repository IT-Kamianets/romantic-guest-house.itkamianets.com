<section class="amenities-teaser section--A">
	<div class="container-lg px-4 py-5">
		<app-section
			[kicker]="'features.kicker' | t"
			[title]="'features.title' | t"
			[subtitle]="'features.subtitle' | t"
		>
			<div section-actions>
				<a routerLink="/amenities" class="btn btn-outline-primary">{{ 'features.cta' | t }}</a>
			</div>
			<app-pill-grid [items]="items"></app-pill-grid>
		</app-section>
	</div>
</section>
