<section class="faq">
	<div class="container-lg px-4 py-5 py-lg-6">
		<div class="faq__header">
			<p class="section-kicker">{{ 'faq.kicker' | t }}</p>
			<h2 class="section-title">{{ 'faq.title' | t }}</h2>
			<p class="section-subtitle">
				{{ 'faq.subtitle' | t }}
			</p>
		</div>

		<div class="faq__list">
			<details class="faq-item">
				<summary>{{ 'faq.q1' | t }}</summary>
				<p>{{ 'faq.a1' | t }}</p>
			</details>
			<details class="faq-item">
				<summary>{{ 'faq.q2' | t }}</summary>
				<p>{{ 'faq.a2' | t }}</p>
			</details>
			<details class="faq-item">
				<summary>{{ 'faq.q3' | t }}</summary>
				<p>{{ 'faq.a3' | t }}</p>
			</details>
			<details class="faq-item">
				<summary>{{ 'faq.q4' | t }}</summary>
				<p>{{ 'faq.a4' | t }}</p>
			</details>
		</div>
	</div>
</section>
