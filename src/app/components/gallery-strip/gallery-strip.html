<section class="gallery-strip section--B">
	<div class="container-lg px-4 py-5">
		<app-section
			[kicker]="'galleryStrip.kicker' | t"
			[title]="'galleryStrip.title' | t"
			[subtitle]="'galleryStrip.subtitle' | t"
		>
			<div section-actions>
				<a routerLink="/gallery" class="btn btn-outline-primary">{{ 'galleryStrip.cta' | t }}</a>
			</div>
			<div class="gallery-strip__row">
				<div class="gallery-strip__item" *ngFor="let image of images">
					<img [src]="image.src" [alt]="image.alt | t" loading="lazy" />
				</div>
			</div>
		</app-section>
	</div>
</section>
