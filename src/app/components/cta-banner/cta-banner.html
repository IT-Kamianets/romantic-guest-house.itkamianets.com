<section class="cta-banner">
	<div class="cta-banner__content">
		<p class="cta-banner__kicker" *ngIf="kicker">{{ kicker }}</p>
		<h2 class="cta-banner__title" *ngIf="title">{{ title }}</h2>
		<p class="cta-banner__body" *ngIf="body">{{ body }}</p>
	</div>
	<div class="cta-banner__actions">
		<ng-content></ng-content>
	</div>
</section>
