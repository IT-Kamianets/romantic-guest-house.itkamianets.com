<section class="featured-rooms section--A">
	<div class="container-lg px-4 py-5">
		<app-section
			kicker="Rooms"
			title="Stay in warm, romantic spaces"
			subtitle="Deluxe doubles and a spacious apartment with balcony comfort."
		>
			<div section-actions>
				<a routerLink="/rooms" class="btn btn-outline-primary">View all rooms</a>
			</div>
			<div class="featured-rooms__grid">
				<app-list-item
					*ngFor="let product of displayProducts"
					[product]="product"
					variant="card"
				></app-list-item>
			</div>
		</app-section>
	</div>
</section>
