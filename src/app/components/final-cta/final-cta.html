<section class="final-cta section--A">
	<div class="container-lg px-4 py-5">
		<app-cta-banner
			[kicker]="'finalCta.kicker' | t"
			[title]="'finalCta.title' | t"
			[body]="'finalCta.body' | t"
		>
			<button class="btn btn-primary btn-lg" type="button" (click)="openContact()">
				{{ 'finalCta.contact' | t }}
			</button>
			<a href="tel:+380675101504" class="btn btn-outline-secondary btn-lg">
				{{ 'finalCta.call' | t }}
			</a>
		</app-cta-banner>
	</div>
</section>
