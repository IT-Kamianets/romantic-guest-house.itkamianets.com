<section class="trust-strip section--B">
	<div class="container-lg px-4 py-5">
		<div class="trust-strip__header">
			<p class="section-kicker">{{ 'trust.kicker' | t }}</p>
			<h2 class="section-title">{{ 'trust.title' | t }}</h2>
			<p class="section-subtitle">
				{{ 'trust.subtitle' | t }}
			</p>
		</div>
		<div class="trust-strip__grid">
			<div class="trust-strip__item">
				<i class="bi bi-water"></i>
				<span>{{ 'trust.item1' | t }}</span>
			</div>
			<div class="trust-strip__item">
				<i class="bi bi-house-heart"></i>
				<span>{{ 'trust.item2' | t }}</span>
			</div>
			<div class="trust-strip__item">
				<i class="bi bi-droplet"></i>
				<span>{{ 'trust.item3' | t }}</span>
			</div>
			<div class="trust-strip__item">
				<i class="bi bi-geo-alt"></i>
				<span>{{ 'trust.item4' | t }}</span>
			</div>
		</div>
	</div>
</section>
