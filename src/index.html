		<script>
			(() => {
				try {
					const stored = localStorage.getItem('theme');
					const theme = stored || 'hotel';
					document.documentElement.setAttribute('data-theme', theme);
				} catch (error) {
					document.documentElement.setAttribute('data-theme', 'hotel');
				}
			})();
		</script>
